# Publicación cada 5 minutos SIN pagar Vercel Pro.
#
# El plan Hobby (gratis) de Vercel solo permite crons 1 vez al día. Si quieres
# que los posts se publiquen a su hora exacta durante el día, usa esta GitHub
# Action gratuita: cada 5 min llama al endpoint /api/cron/publish de tu app.
#
# Para activarla, en GitHub → Settings → Secrets and variables → Actions añade:
#   - Secret  CRON_SECRET  → el mismo valor que pusiste en Vercel.
#   - Variable CRON_URL    → https://TU-APP.vercel.app  (sin barra final)
#
# Si no las configuras, el job simplemente no hace nada (no falla ruidosamente).
name: publish-scheduled-posts

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Llamar al endpoint de publicación
        env:
          CRON_URL: ${{ vars.CRON_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "CRON_URL o CRON_SECRET no configurados; nada que hacer."
            exit 0
          fi
          echo "POST $CRON_URL/api/cron/publish"
          code=$(curl -s -o /tmp/out.json -w "%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$CRON_URL/api/cron/publish")
          echo "HTTP $code"; cat /tmp/out.json || true
          # No fallamos el workflow por errores transitorios de la app.
          exit 0
