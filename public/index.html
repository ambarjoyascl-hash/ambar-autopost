<!DOCTYPE html>
<html lang="es-CL">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Ámbar Oro — Live de Oro</title>
<meta name="description" content="Compra oro en vivo. Mira las piezas que subimos durante el live, reacciona y agrégalas al carrito. Envíos a todo Chile." />
<meta property="og:type" content="website" />
<meta property="og:title" content="Ámbar Oro — Live de Oro ✨" />
<meta property="og:description" content="Piezas en vivo · Reacciona · Agrega al carrito · Envíos a todo Chile" />
<meta name="theme-color" content="#0e0b06" />
<style>
  :root{
    --bg:#0e0b06;--bg-soft:#171106;--card:#1c1508;--card-2:#241a09;--line:#3a2c11;
    --gold:#e7bd63;--gold-2:#f6dfa0;--gold-deep:#b8862f;--text:#f3ead6;--muted:#b9ab8c;
    --ok:#37c26b;--live:#e5484d;--radius:18px;--maxw:600px;--shadow:0 10px 40px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{background:radial-gradient(1000px 600px at 50% -8%,#2a1e08 0%,transparent 55%),var(--bg);
    color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,Roboto,Arial,sans-serif;
    line-height:1.5;-webkit-font-smoothing:antialiased;padding-bottom:96px}
  a{color:inherit}img,video{max-width:100%;display:block}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 14px}
  header{position:sticky;top:0;z-index:40;background:rgba(14,11,6,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .bar{display:flex;align-items:center;justify-content:space-between;height:56px;max-width:var(--maxw);margin:0 auto;padding:0 14px;gap:10px}
  .brand{display:flex;align-items:center;gap:8px;font-weight:700}
  .brand .logo{width:30px;height:30px;border-radius:50%;background:radial-gradient(circle at 30% 30%,var(--gold-2),var(--gold-deep));box-shadow:0 0 0 2px rgba(231,189,99,.25)}
  .brand b{background:linear-gradient(90deg,var(--gold-2),var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
  .live-badge{display:none;align-items:center;gap:6px;font-size:11.5px;font-weight:800;color:#fff;background:var(--live);padding:4px 9px;border-radius:999px;letter-spacing:.5px}
  .live-badge.on{display:inline-flex}
  .live-badge .dot{width:7px;height:7px;border-radius:50%;background:#fff;animation:blink 1s infinite}
  @keyframes blink{50%{opacity:.25}}
  .cart-btn{position:relative;border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:999px;padding:8px 13px;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:7px;font-weight:700}
  .cart-btn:active{transform:scale(.96)}
  .cart-count{min-width:20px;height:20px;padding:0 5px;border-radius:999px;background:var(--gold);color:#241a09;font-size:12px;font-weight:800;display:none;align-items:center;justify-content:center}
  .cart-count.show{display:inline-flex}

  .intro{text-align:center;padding:18px 0 4px}
  .intro h1{font-size:22px;margin:0 0 4px;font-weight:800}
  .intro h1 .g{background:linear-gradient(90deg,var(--gold-2),var(--gold),var(--gold-deep));-webkit-background-clip:text;background-clip:text;color:transparent}
  .intro p{color:var(--muted);margin:0;font-size:14px}

  .feed{padding:14px 0 6px;display:flex;flex-direction:column;gap:18px}
  .post{background:linear-gradient(180deg,var(--card),var(--card-2));border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
  .post.new{animation:slidein .45s ease}
  @keyframes slidein{from{transform:translateY(-10px) scale(.99);opacity:0}to{transform:none;opacity:1}}
  .phead{display:flex;align-items:center;gap:9px;padding:11px 14px}
  .phead .av{width:30px;height:30px;border-radius:50%;background:radial-gradient(circle at 30% 30%,var(--gold-2),var(--gold-deep))}
  .phead .n{font-weight:700;font-size:14px}.phead .t{margin-left:auto;font-size:11.5px;color:var(--muted)}
  .media{position:relative;background:radial-gradient(circle at 50% 35%,#2c2009,#140e05);max-height:70vh;overflow:hidden}
  .media img,.media video{width:100%;max-height:70vh;object-fit:cover;display:block}
  .media .emoji{height:320px;display:flex;align-items:center;justify-content:center;font-size:90px}
  .vtag{position:absolute;top:12px;right:12px;background:rgba(14,11,6,.72);border:1px solid var(--line);color:var(--gold);font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px;backdrop-filter:blur(4px)}
  .sold{position:absolute;inset:0;background:rgba(10,8,4,.6);display:flex;align-items:center;justify-content:center}
  .sold span{border:2px solid var(--live);color:#fff;background:rgba(229,72,77,.9);font-weight:800;padding:8px 20px;border-radius:8px;transform:rotate(-8deg);font-size:20px;letter-spacing:1px}
  .pbody{padding:12px 14px 14px}
  .prow{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
  .pinfo h3{margin:0 0 2px;font-size:17px;font-weight:700}
  .pinfo .desc{margin:0;color:var(--muted);font-size:13.5px}
  .price{font-size:22px;font-weight:800;color:var(--gold-2);white-space:nowrap}
  .actions{display:flex;align-items:center;gap:8px;margin-top:13px}
  .react{border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:999px;padding:8px 13px;cursor:pointer;font-size:15px;font-weight:700;display:flex;align-items:center;gap:6px;position:relative;overflow:visible}
  .react:active{transform:scale(.9)}
  .react .c{font-size:12.5px;color:var(--muted);font-weight:700;min-width:8px}
  .addcart{margin-left:auto;border:none;background:linear-gradient(90deg,var(--gold),var(--gold-deep));color:#211806;font-weight:800;border-radius:12px;padding:11px 18px;cursor:pointer;font-size:15px;white-space:nowrap}
  .addcart:active{transform:scale(.96)}.addcart.in{background:var(--card-2);color:var(--gold);border:1px solid var(--gold)}
  .addcart:disabled{opacity:.5;cursor:not-allowed}

  .float{position:absolute;pointer-events:none;font-size:24px;animation:rise 1.1s ease-out forwards;z-index:5}
  @keyframes rise{0%{transform:translateY(0) scale(.6);opacity:0}15%{opacity:1}100%{transform:translateY(-90px) scale(1.3) rotate(12deg);opacity:0}}

  .state{text-align:center;color:var(--muted);padding:60px 20px}.state .big{font-size:50px;margin-bottom:12px}
  .spin{display:inline-block;width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  footer{text-align:center;color:var(--muted);font-size:13px;padding:24px 14px 10px;border-top:1px solid var(--line);margin-top:24px}
  footer a{color:var(--gold);text-decoration:none}

  /* Carrito */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);opacity:0;visibility:hidden;transition:.2s;z-index:50}
  .overlay.open{opacity:1;visibility:visible}
  .drawer{position:fixed;top:0;right:0;height:100%;width:min(420px,100%);background:var(--bg-soft);border-left:1px solid var(--line);z-index:60;transform:translateX(100%);transition:transform .25s;display:flex;flex-direction:column}
  .drawer.open{transform:translateX(0)}
  .dhead{display:flex;align-items:center;justify-content:space-between;padding:18px;border-bottom:1px solid var(--line)}
  .dhead h3{margin:0;font-size:19px}
  .x{background:none;border:none;color:var(--muted);font-size:26px;cursor:pointer;line-height:1}
  .ditems{flex:1;overflow-y:auto;padding:12px 16px}
  .empty{text-align:center;color:var(--muted);padding:50px 20px}.empty .big{font-size:44px;margin-bottom:10px}
  .li{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
  .li .ic{width:52px;height:52px;border-radius:12px;flex:none;display:flex;align-items:center;justify-content:center;font-size:24px;background:radial-gradient(circle at 40% 30%,#2c2009,#140e05);border:1px solid var(--line);overflow:hidden}
  .li .ic img{width:100%;height:100%;object-fit:cover}
  .li .info{flex:1;min-width:0}.li .info h4{margin:0 0 2px;font-size:14px}.li .info .p{color:var(--gold-2);font-weight:700;font-size:14px}
  .li .rm{margin-top:6px;background:none;border:none;color:#c46a5a;font-size:12.5px;cursor:pointer;padding:0}
  .dfoot{border-top:1px solid var(--line);padding:16px}
  .totrow{display:flex;justify-content:space-between;align-items:baseline;margin:2px 0 10px}
  .totrow .t{font-size:15px;color:var(--muted)}.totrow .v{font-size:24px;font-weight:800;color:var(--gold-2)}
  .note{font-size:11.5px;color:var(--muted);margin:6px 0 12px}
  .pay{width:100%;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:800;cursor:pointer;background:linear-gradient(90deg,var(--gold),var(--gold-deep));color:#211806;display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:9px}
  .pay:disabled{opacity:.6}
  .waB{width:100%;border:none;border-radius:14px;padding:13px;font-size:15px;font-weight:800;cursor:pointer;background:linear-gradient(90deg,#25d366,#128c4a);color:#04220f;display:flex;align-items:center;justify-content:center;gap:9px}

  .floatbar{position:fixed;left:0;right:0;bottom:0;z-index:45;padding:12px 14px calc(12px + env(safe-area-inset-bottom));background:linear-gradient(0deg,var(--bg) 62%,transparent);display:none}
  .floatbar.show{display:block}
  .floatbar button{width:100%;max-width:var(--maxw);margin:0 auto;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:800;cursor:pointer;background:linear-gradient(90deg,var(--gold),var(--gold-deep));color:#211806;display:flex;align-items:center;justify-content:center;gap:10px}

  .toast{position:fixed;left:50%;bottom:96px;translate:-50% 20px;background:#241a09;border:1px solid var(--gold);color:var(--gold-2);padding:11px 18px;border-radius:999px;font-size:14px;font-weight:600;z-index:80;opacity:0;pointer-events:none;transition:.25s;max-width:90%}
  .toast.show{opacity:1;translate:-50% 0}
</style>
</head>
<body>

<header>
  <div class="bar">
    <div class="brand"><span class="logo"></span>Ámbar <b>Oro</b>
      <span class="live-badge" id="liveBadge"><span class="dot"></span>EN VIVO</span>
    </div>
    <button class="cart-btn" id="cartBtn">🛒 <span class="cart-count" id="cartCount">0</span></button>
  </div>
</header>

<div class="wrap">
  <div class="intro">
    <h1>Live de <span class="g">Oro</span> ✨</h1>
    <p>Mira las piezas, reacciona ❤️ y agrégalas al carrito. Envíos a todo Chile 🇨🇱</p>
  </div>
  <section class="feed" id="feed"></section>
  <div class="state" id="state" style="display:none"></div>
</div>

<footer>
  <p><b style="color:var(--text)">Ámbar Oro</b> · Compra de oro en vivo · Chile</p>
  <p>¿Dudas? <a id="waLink" href="#">Escríbeme por WhatsApp</a></p>
  <p style="margin-top:14px;opacity:.55;font-size:12px"><a href="/admin.html" style="color:var(--muted);text-decoration:none">⚙️ Panel de administración</a></p>
</footer>

<div class="floatbar" id="floatbar"><button id="floatBtn">🛒 Ver carrito · <span id="floatTotal">$0</span></button></div>

<div class="overlay" id="overlay"></div>
<aside class="drawer" id="drawer">
  <div class="dhead"><h3>Tu carrito</h3><button class="x" id="closeDrawer">×</button></div>
  <div class="ditems" id="ditems"></div>
  <div class="dfoot" id="dfoot"></div>
</aside>

<div class="toast" id="toast"></div>

<script>
/* ═══ Edita solo esto ═══ */
const CONFIG = {
  whatsapp:   "56977669288",
  instagram:  "https://instagram.com/ambarjoyas.cl",
  shopDomain: "https://www.ambarjoyas.cl",
  currencySymbol: "$",
};
/* ═══════════════════════ */

const $ = s => document.querySelector(s);
const money = n => CONFIG.currencySymbol + Number(n||0).toLocaleString("es-CL");
const esc = s => String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const LS_CART = "ambar_cart_live_v1";
const LS_REACTED = "ambar_reacted_v1";

let ITEMS = [];
let firstLoad = true;
let seen = new Set();
let cart = [];
try{ cart = JSON.parse(localStorage.getItem(LS_CART))||[]; }catch(e){ cart=[]; }
let localReacts = {};   // conteos optimistas locales
let pending = {};       // reacciones por enviar (batch)

$("#waLink").href = "https://wa.me/"+CONFIG.whatsapp+"?text="+encodeURIComponent("¡Hola Ámbar Oro! Tengo una consulta sobre el live ✨");

function showState(icon,msg){ $("#feed").innerHTML=""; const s=$("#state"); s.style.display="block"; s.innerHTML=`<div class="big">${icon}</div>${msg}`; }

/* ── Cargar feed ── */
async function load(){
  try{
    const r = await fetch("/api/items",{cache:"no-store"});
    const d = await r.json();
    ITEMS = Array.isArray(d.items)?d.items:[];
    ITEMS.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
    render();
    $("#liveBadge").classList.toggle("on", ITEMS.some(i=>!i.sold));
    firstLoad=false;
  }catch(e){ if(firstLoad) showState("😕","No se pudo cargar. Recarga en un momento."); }
}

function reactCount(it, type){
  const base = (it.reactions && it.reactions[type]) || 0;
  return base + ((localReacts[it.id] && localReacts[it.id][type]) || 0);
}

function render(){
  if(!ITEMS.length){ showState("⏳","Aún no hay piezas. ¡Empiezan a aparecer cuando arranque el live!"); return; }
  $("#state").style.display="none";
  $("#feed").innerHTML = ITEMS.map(it=>{
    const isNew = !firstLoad && !seen.has(it.id);
    const media = it.mediaType==="video"
      ? `<video src="${esc(it.mediaUrl)}" muted loop autoplay playsinline preload="metadata"></video><div class="vtag">▶ VIDEO</div>`
      : (it.mediaUrl ? `<img src="${esc(it.mediaUrl)}" alt="${esc(it.title)}" loading="lazy">` : `<div class="emoji">🥇</div>`);
    const inCart = cart.some(c=>c.id===it.id);
    const addBtn = it.sold
      ? `<button class="addcart" disabled>Vendida</button>`
      : `<button class="addcart ${inCart?'in':''}" data-add="${esc(it.id)}">${inCart?'✓ En carrito':'🛒 Agregar'}</button>`;
    return `<article class="post ${isNew?'new':''}" data-id="${esc(it.id)}">
      <div class="phead"><span class="av"></span><span class="n">Ámbar Oro</span><span class="t">en el live</span></div>
      <div class="media">${media}${it.sold?`<div class="sold"><span>VENDIDA</span></div>`:""}</div>
      <div class="pbody">
        <div class="prow">
          <div class="pinfo"><h3>${esc(it.title||"Pieza de oro")}</h3>${it.desc?`<p class="desc">${esc(it.desc)}</p>`:""}</div>
          <div class="price">${money(it.price)}</div>
        </div>
        <div class="actions">
          <button class="react" data-react="heart" data-id="${esc(it.id)}">❤️ <span class="c">${reactCount(it,'heart')||''}</span></button>
          <button class="react" data-react="fire" data-id="${esc(it.id)}">🔥 <span class="c">${reactCount(it,'fire')||''}</span></button>
          ${addBtn}
        </div>
      </div></article>`;
  }).join("");
  ITEMS.forEach(i=>seen.add(i.id));
  $("#feed").querySelectorAll("[data-add]").forEach(b=> b.onclick=()=>addToCart(b.dataset.add));
  $("#feed").querySelectorAll("[data-react]").forEach(b=> b.onclick=(e)=>react(b.dataset.id, b.dataset.react, b, e));
}

/* ── Reacciones ── */
function react(id, type, btn, ev){
  localReacts[id] = localReacts[id] || { heart:0, fire:0 };
  localReacts[id][type]++;
  pending[id] = pending[id] || { heart:0, fire:0 };
  pending[id][type]++;
  // actualizar contador visible
  const c = btn.querySelector(".c");
  const it = ITEMS.find(x=>x.id===id);
  if(c && it) c.textContent = reactCount(it,type) || '';
  // corazón flotante
  spawnFloat(btn, type==="fire"?"🔥":"❤️");
}
function spawnFloat(btn, emoji){
  const f=document.createElement("span"); f.className="float"; f.textContent=emoji;
  f.style.left=(6+Math.random()*20)+"px"; f.style.top="-6px";
  btn.appendChild(f); setTimeout(()=>f.remove(),1100);
}
async function flushReacts(){
  const ids = Object.keys(pending); if(!ids.length) return;
  const batch = pending; pending = {};
  for(const id of ids){
    try{ await fetch("/api/react",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id, ...batch[id]})}); }catch(e){}
  }
}
setInterval(flushReacts, 2500);

/* ── Carrito ── */
function saveCart(){ localStorage.setItem(LS_CART, JSON.stringify(cart)); }
function addToCart(id){
  const it = ITEMS.find(x=>x.id===id); if(!it || it.sold) return;
  if(cart.some(c=>c.id===id)){ openDrawer(); return; }
  cart.push({ id:it.id, title:it.title, price:it.price, mediaUrl:it.mediaUrl, mediaType:it.mediaType, qty:1 });
  saveCart(); renderCart(); renderFloat(); render(); toast("Agregado al carrito ✓");
}
function removeItem(idx){ cart.splice(idx,1); saveCart(); renderCart(); renderFloat(); render(); }
const cartTotal = ()=> cart.reduce((s,i)=>s+(i.price||0)*i.qty,0);

function renderCart(){
  const n = cart.length;
  const cc=$("#cartCount"); cc.textContent=n; cc.classList.toggle("show",n>0);
  if(!cart.length){
    $("#ditems").innerHTML=`<div class="empty"><div class="big">🛒</div>Tu carrito está vacío.<br>Agrega piezas del live.</div>`;
    $("#dfoot").innerHTML=""; return;
  }
  $("#ditems").innerHTML = cart.map((i,idx)=>{
    const ic = i.mediaUrl ? (i.mediaType==="video"?`<video src="${esc(i.mediaUrl)}" muted></video>`:`<img src="${esc(i.mediaUrl)}" alt="">`) : "🥇";
    return `<div class="li"><div class="ic">${ic}</div><div class="info"><h4>${esc(i.title)}</h4><div class="p">${money(i.price)}</div>
      <button class="rm" data-rm="${idx}">Quitar</button></div></div>`;
  }).join("");
  $("#dfoot").innerHTML = `
    <div class="totrow"><span class="t">Total</span><span class="v">${money(cartTotal())}</span></div>
    <p class="note">🔒 Pagas seguro en el checkout de la tienda (Mercado Pago, tarjetas). El envío se coordina luego.</p>
    <button class="pay" id="payBtn">🛍️ Ir a pagar</button>
    <button class="waB" id="waB">💬 Coordinar por WhatsApp</button>`;
  $("#ditems").querySelectorAll("[data-rm]").forEach(b=> b.onclick=()=>removeItem(+b.dataset.rm));
  $("#payBtn").onclick = goCheckout;
  $("#waB").onclick = waCheckout;
}
function renderFloat(){
  $("#floatTotal").textContent = money(cartTotal());
  $("#floatbar").classList.toggle("show", cart.length>0);
}

async function goCheckout(){
  if(!cart.length) return;
  const btn=$("#payBtn"); btn.disabled=true; const old=btn.textContent; btn.textContent="Un momento…";
  try{
    const r = await fetch("/api/checkout",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({ items: cart.map(i=>({id:i.id,qty:i.qty})) })});
    const d = await r.json();
    if(d.invoice_url){ window.location.href=d.invoice_url; return; }
    if(d.error==="sold"){ toast(d.message||"Una pieza ya se vendió."); load(); }
    else if(d.error==="not_configured"){ toast("Falta conectar el cobro (token Shopify)."); }
    else toast("No se pudo iniciar el pago.");
    btn.disabled=false; btn.textContent=old;
  }catch(e){ toast("Error de conexión."); btn.disabled=false; btn.textContent=old; }
}
function waCheckout(){
  if(!cart.length) return;
  let m="¡Hola Ámbar Oro! ✨ Quiero coordinar este pedido:\n\n";
  cart.forEach((i,n)=>{ m+=`${n+1}) ${i.title} — ${money(i.price)}\n`; });
  m+=`\nTotal: ${money(cartTotal())}`;
  window.open("https://wa.me/"+CONFIG.whatsapp+"?text="+encodeURIComponent(m),"_blank");
}

/* Drawer */
const openDrawer=()=>{ $("#drawer").classList.add("open"); $("#overlay").classList.add("open"); };
const closeDrawer=()=>{ $("#drawer").classList.remove("open"); $("#overlay").classList.remove("open"); };
$("#cartBtn").onclick=openDrawer; $("#floatBtn").onclick=openDrawer;
$("#closeDrawer").onclick=closeDrawer; $("#overlay").onclick=closeDrawer;

let toastT;
function toast(msg){ const el=$("#toast"); el.textContent=msg; el.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove("show"),2200); }

/* Init */
showState('<span class="spin"></span>',"Cargando el live…");
renderCart(); renderFloat();
load();
setInterval(load, 4000);
window.addEventListener("beforeunload", flushReacts);
</script>
</body>
</html>
